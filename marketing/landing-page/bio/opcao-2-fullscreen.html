<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juliana Alves · Corretora de Imóveis · Palmas-TO</title>
<meta name="description" content="Juliana Alves — Corretora de Imóveis em Palmas/TO. CRECI 5377. Lançamentos, revenda e investimento.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--preto:#0b0b0b;--branco:#f5f5f5;--cinza:#9a9a9a;--linha:rgba(255,255,255,.14);--wa:#25D366}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#000;color:var(--branco);display:flex;justify-content:center}
  .stage{
    position:relative;width:100%;max-width:430px;min-height:100vh;min-height:100dvh;
    overflow:hidden;background:#101010;display:flex;flex-direction:column;justify-content:flex-end;
  }
  /* FOTO DE FUNDO fullscreen */
  .bg{position:absolute;inset:0}
  .bg img{position:relative;z-index:2;width:100%;height:100%;object-fit:cover;object-position:top center}
  .bg .fallback{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(165deg,#242424,#0d0d0d);
    color:#454545;font-size:12px;letter-spacing:3px;text-transform:uppercase;text-align:center;padding:20px;
  }
  .bg::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.34) 0%,rgba(0,0,0,.05) 26%,rgba(0,0,0,.42) 55%,rgba(0,0,0,.93) 82%,#000 100%);
  }

  /* TOPO — marca discreta */
  .top{
    position:absolute;top:0;left:0;right:0;z-index:5;
    display:flex;justify-content:space-between;align-items:center;padding:20px 22px;
  }
  .top .creci{font-size:10px;letter-spacing:2.5px;color:rgba(255,255,255,.85);border:1px solid var(--linha);padding:7px 12px;border-radius:50px;backdrop-filter:blur(6px)}
  .top img{height:52px;width:auto;opacity:.95;mix-blend-mode:screen}
  .top .fb{font-size:10px;letter-spacing:2.5px;color:rgba(255,255,255,.85)}

  /* CONTEÚDO ancorado embaixo */
  .conteudo{position:relative;z-index:5;padding:0 24px 26px}
  .nome h1{font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:600;line-height:.98;letter-spacing:.5px}
  .nome .sub{margin-top:9px;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#d6d6d6}
  .nome .frase{
    margin-top:14px;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:17.5px;line-height:1.4;color:#e2e2e2;max-width:320px;
  }

  /* provas em linha */
  .stats{display:flex;gap:0;margin:20px 0 22px;border-top:1px solid var(--linha);border-bottom:1px solid var(--linha)}
  .stat{flex:1;text-align:center;padding:13px 4px}
  .stat + .stat{border-left:1px solid var(--linha)}
  .stat b{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;display:block;line-height:1}
  .stat span{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cinza);display:block;margin-top:5px}

  /* AÇÕES */
  .acoes{display:flex;flex-direction:column;gap:11px}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:11px;
    padding:17px;border-radius:50px;text-decoration:none;font-size:14.5px;font-weight:600;
    transition:all .22s ease;letter-spacing:.2px;
  }
  .btn:active{transform:scale(.98)}
  .btn svg{width:19px;height:19px}
  .btn-wa{background:var(--branco);color:#0a0a0a}
  .btn-wa svg{fill:#0a0a0a}
  .btn-wa:hover{background:#e4e4e4}
  .btn-ghost{
    background:rgba(255,255,255,.07);color:var(--branco);
    border:1px solid var(--linha);backdrop-filter:blur(8px);font-weight:500;
  }
  .btn-ghost:hover{background:rgba(255,255,255,.13)}

  .social{display:flex;justify-content:center;gap:26px;margin-top:18px}
  .social a{color:#bdbdbd;font-size:11px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px;transition:.2s}
  .social a:hover{color:#fff;border-color:#fff}
</style>
</head>

    </div>
  </div>
</body>
</html>
